input_number:
  floor_heat_prediction_horizon_min:
    name: 地暖预测窗口
    min: 5
    max: 60
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 25
  floor_heat_start_delta:
    name: 地暖启动温差
    min: 0.1
    max: 2.0
    step: 0.05
    unit_of_measurement: °C
    mode: box
    initial: 0.35
  floor_heat_stop_margin:
    name: 地暖停热边距
    min: 0.0
    max: 1.0
    step: 0.05
    unit_of_measurement: °C
    mode: box
    initial: 0.15
  floor_heat_min_on_min:
    name: 地暖最小开启时长
    min: 5
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 20
  floor_heat_min_off_min:
    name: 地暖最小关闭时长
    min: 5
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 15
  floor_heat_boiler_start_delay_sec:
    name: 地暖锅炉启动确认
    min: 30
    max: 1800
    step: 10
    unit_of_measurement: s
    mode: box
    initial: 180
  floor_heat_boiler_stop_delay_min:
    name: 地暖锅炉停机延时
    min: 1
    max: 60
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 8
