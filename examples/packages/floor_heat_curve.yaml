template:
  - trigger:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - sensor.lumi_cn_lumi_158d00041f4592_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d000406b1e1_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d00044c0213_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d00044bc2eb_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d00041e2f7c_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d0003cd3c36_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d0003cd3c41_v1_temperature_p_2_1
          - sensor.lumi_cn_lumi_158d0002b96514_v1_temperature_p_2_1
          - input_number.floor_heat_zhu_wo_temp_10m
          - input_number.floor_heat_zhu_wo_temp_30m
          - input_number.floor_heat_er_tong_fang_temp_10m
          - input_number.floor_heat_er_tong_fang_temp_30m
          - input_number.floor_heat_lao_ren_fang_temp_10m
          - input_number.floor_heat_lao_ren_fang_temp_30m
          - input_number.floor_heat_shu_fang_temp_10m
          - input_number.floor_heat_shu_fang_temp_30m
          - input_number.floor_heat_can_ting_temp_10m
          - input_number.floor_heat_can_ting_temp_30m
          - input_number.floor_heat_qi_ju_shi_temp_10m
          - input_number.floor_heat_qi_ju_shi_temp_30m
          - input_number.floor_heat_da_ting_temp_10m
          - input_number.floor_heat_da_ting_temp_30m
          - input_number.floor_heat_wan_ju_fang_temp_10m
          - input_number.floor_heat_wan_ju_fang_temp_30m
          - input_number.floor_heat_prediction_horizon_min
          - input_number.floor_heat_residual_bias
          - binary_sensor.wei_neng_wai_zhi_beng
          - switch.lumi_cn_lumi_158d0001a5d316_v1_on_p_2_1
          - switch.yeelink_cn_358374474_sw1_on_p_3_1
          - switch.yeelink_cn_358374550_sw1_on_p_2_1
          - switch.yeelink_cn_358373839_sw1_on_p_3_1
          - switch.yeelink_cn_404920863_sw1_on_p_2_1
          - switch.yeelink_cn_404920863_sw1_on_p_3_1
          - switch.yeelink_cn_358374474_sw1_on_p_2_1
          - switch.yeelink_cn_358373839_sw1_on_p_2_1
          - switch.yeelink_cn_358374550_sw1_on_p_3_1
    sensor:
      - name: floor_heat_zhu_wo_slope_10m
        unique_id: floor_heat_zhu_wo_slope_10m
        unit_of_measurement: "°C/min"
        state: >
          {% set current = states('sensor.lumi_cn_lumi_158d00041f4592_v1_temperature_p_2_1') | float(0) %}
          {% set previous = states('input_number.floor_heat_zhu_wo_temp_10m') | float(0) %}
          {{ ((current - previous) / 10) | round(4) }}
      - name: floor_heat_zhu_wo_slope_30m
        unique_id: floor_heat_zhu_wo_slope_30m
        unit_of_measurement: "°C/min"
        state: >
          {% set current = states('sensor.lumi_cn_lumi_158d00041f4592_v1_temperature_p_2_1') | float(0) %}
          {% set previous = states('input_number.floor_heat_zhu_wo_temp_30m') | float(0) %}
          {{ ((current - previous) / 30) | round(4) }}
      - name: floor_heat_zhu_wo_predicted_temp
        unique_id: floor_heat_zhu_wo_predicted_temp
        unit_of_measurement: "°C"
        state: >
          {% set current = states('sensor.lumi_cn_lumi_158d00041f4592_v1_temperature_p_2_1') | float(0) %}
          {% set slope10 = states('sensor.floor_heat_zhu_wo_slope_10m') | float(0) %}
          {% set slope30 = states('sensor.floor_heat_zhu_wo_slope_30m') | float(0) %}
          {% set horizon = states('input_number.floor_heat_prediction_horizon_min') | float(25) %}
          {% set residual = states('input_number.floor_heat_residual_bias') | float(0.25) %}
          {% set valve_on = is_state('switch.yeelink_cn_358374474_sw1_on_p_3_1', 'on') %}
          {% set heat_residual = valve_on or is_state('binary_sensor.wei_neng_wai_zhi_beng', 'on') or is_state('switch.lumi_cn_lumi_158d0001a5d316_v1_on_p_2_1', 'on') %}
          {% set weighted = slope10 * 0.7 + slope30 * 0.3 %}
          {{ (current + weighted * horizon + (residual if heat_residual else 0)) | round(2) }}
      - name: floor_heat_zhu_wo_hvac_action
        unique_id: floor_heat_zhu_wo_hvac_action
        state: >
          {% if is_state('input_boolean.floor_heat_zhu_wo_enabled', 'off') %}
            off
          {% elif is_state('switch.yeelink_cn_358374474_sw1_on_p_3_1', 'on') %}
            heating
          {% else %}
            idle
          {% endif %}
      - name: floor_heat_er_tong_fang_slope_10m
        unique_id: floor_heat_er_tong_fang_slope_10m
        unit_of_measurement: "°C/min"
        state: >
