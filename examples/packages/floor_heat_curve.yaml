    name: 地暖泵停机延时
    min: 1
    max: 60
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 12
  floor_heat_residual_bias:
    name: 地暖余热偏置
    min: 0.0
    max: 1.5
    step: 0.05
    unit_of_measurement: °C
