script:
  floor_heat_evaluate_room:
    alias: 地暖单房间评估
    mode: parallel
    sequence:
      - variables:
          enabled: "{{ is_state(enabled_entity, 'on') }}"
          sensor_valid: "{{ is_state(sensor_valid_entity, 'on') }}"
          current_temp: "{{ states(current_temperature_entity) | float(0) }}"
          target_temp: "{{ states(target_temperature_entity) | float(0) }}"
          predicted_temp: "{{ states(predicted_temperature_entity) | float(0) }}"
          valve_on: "{{ is_state(valve_entity, 'on') }}"
          start_delta: "{{ states('input_number.floor_heat_start_delta') | float(0.35) }}"
          stop_margin: "{{ states('input_number.floor_heat_stop_margin') | float(0.15) }}"
          min_on_sec: "{{ (states('input_number.floor_heat_min_on_min') | float(20) * 60) | int }}"
          min_off_sec: "{{ (states('input_number.floor_heat_min_off_min') | float(15) * 60) | int }}"
          elapsed_sec: "{{ (as_timestamp(now()) - as_timestamp(states(last_switch_entity), default=0)) | int(999999) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (not enabled or not sensor_valid) and valve_on }}"
            sequence:
              - action: homeassistant.turn_off
                data:
                  entity_id: "{{ valve_entity }}"
              - action: input_datetime.set_datetime
                data:
                  entity_id: "{{ last_switch_entity }}"
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - conditions:
              - condition: template
                value_template: >
                  {{ valve_on
                     and elapsed_sec >= min_on_sec
                     and (current_temp >= (target_temp - stop_margin) or predicted_temp >= target_temp) }}
            sequence:
              - action: homeassistant.turn_off
                data:
                  entity_id: "{{ valve_entity }}"
              - action: input_datetime.set_datetime
                data:
                  entity_id: "{{ last_switch_entity }}"
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - conditions:
              - condition: template
                value_template: >
                  {{ enabled
                     and sensor_valid
                     and (not valve_on)
                     and elapsed_sec >= min_off_sec
                     and current_temp <= (target_temp - start_delta)
                     and predicted_temp < (target_temp - stop_margin) }}
            sequence:
              - action: homeassistant.turn_on
                data:
                  entity_id: "{{ valve_entity }}"
              - action: input_datetime.set_datetime
                data:
                  entity_id: "{{ last_switch_entity }}"
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

automation:
  - id: floor_heat_seed_snapshots_on_start
    alias: 地暖启动后初始化温度快照
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - action: automation.trigger
        target:
