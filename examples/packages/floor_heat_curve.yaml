  - id: floor_heat_set_preset_targets
    alias: 地暖预设温度同步
    trigger:
      - trigger: state
        entity_id:
          - input_select.floor_heat_zhu_wo_preset
          - input_select.floor_heat_er_tong_fang_preset
          - input_select.floor_heat_lao_ren_fang_preset
          - input_select.floor_heat_shu_fang_preset
          - input_select.floor_heat_can_ting_preset
          - input_select.floor_heat_qi_ju_shi_preset
          - input_select.floor_heat_da_ting_preset
          - input_select.floor_heat_wan_ju_fang_preset
    action:
      - variables:
          preset_target: >
            {% set mapping = {'away': 18, 'comfort': 23, 'home': 22, 'sleep': 21} %}
            {{ mapping.get(trigger.to_state.state) }}
          target_entity: >
            {% set entity = trigger.entity_id %}
            {% if entity == 'input_select.floor_heat_zhu_wo_preset' %}input_number.floor_heat_zhu_wo_target_temp
            {% elif entity == 'input_select.floor_heat_er_tong_fang_preset' %}input_number.floor_heat_er_tong_fang_target_temp
            {% elif entity == 'input_select.floor_heat_lao_ren_fang_preset' %}input_number.floor_heat_lao_ren_fang_target_temp
            {% elif entity == 'input_select.floor_heat_shu_fang_preset' %}input_number.floor_heat_shu_fang_target_temp
            {% elif entity == 'input_select.floor_heat_can_ting_preset' %}input_number.floor_heat_can_ting_target_temp
            {% elif entity == 'input_select.floor_heat_qi_ju_shi_preset' %}input_number.floor_heat_qi_ju_shi_target_temp
            {% elif entity == 'input_select.floor_heat_da_ting_preset' %}input_number.floor_heat_da_ting_target_temp
            {% else %}input_number.floor_heat_wan_ju_fang_target_temp{% endif %}
      - if:
          - condition: template
            value_template: "{{ preset_target is not none }}"
        then:
          - action: input_number.set_value
            data:
              entity_id: "{{ target_entity }}"
              value: "{{ preset_target }}"
  - id: floor_heat_boiler_start
    alias: 地暖锅炉启动
    trigger:
      - trigger: state
        entity_id: binary_sensor.floor_heat_any_demand
        to: "on"
        for:
          seconds: 180
    action:
      - if:
          - condition: state
            entity_id: climate.vaillant_plus_g9c9oxe7o9x7rp6h67ocnc_climate
            state: "off"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.vaillant_plus_g9c9oxe7o9x7rp6h67ocnc_climate
            data:
              hvac_mode: heat
  - id: floor_heat_boiler_stop
    alias: 地暖锅炉停止
    trigger:
      - trigger: state
        entity_id: binary_sensor.floor_heat_any_demand
        to: "off"
        for:
          minutes: 8
    action:
      - if:
          - condition: not
            conditions:
              - condition: state
                entity_id: climate.vaillant_plus_g9c9oxe7o9x7rp6h67ocnc_climate
                state: "off"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.vaillant_plus_g9c9oxe7o9x7rp6h67ocnc_climate
            data:
              hvac_mode: off
  - id: floor_heat_pump_start
    alias: 地暖循环泵启动
    trigger:
      - trigger: state
        entity_id:
          - binary_sensor.floor_heat_any_valve_on
          - binary_sensor.wei_neng_wai_zhi_beng
    action:
      - if:
          - condition: state
            entity_id: binary_sensor.floor_heat_any_valve_on
            state: "on"
          - condition: state
            entity_id: binary_sensor.wei_neng_wai_zhi_beng
            state: "on"
        then:
          - action: homeassistant.turn_on
            data:
              entity_id: switch.lumi_cn_lumi_158d0001a5d316_v1_on_p_2_1
  - id: floor_heat_pump_stop
    alias: 地暖循环泵停止
    trigger:
      - trigger: state
        entity_id: binary_sensor.floor_heat_any_valve_on
        to: "off"
        for:
          minutes: 12
      - trigger: state
        entity_id: binary_sensor.wei_neng_wai_zhi_beng
        to: "off"
        for:
          minutes: 12
    condition:
      - condition: state
        entity_id: binary_sensor.floor_heat_any_valve_on
        state: "off"
      - condition: state
        entity_id: binary_sensor.wei_neng_wai_zhi_beng
        state: "off"
    action:
      - action: homeassistant.turn_off
        data:
          entity_id: switch.lumi_cn_lumi_158d0001a5d316_v1_on_p_2_1
